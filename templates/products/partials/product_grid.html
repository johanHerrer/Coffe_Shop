{% if products %}
    {% for product in products %}
        {% include 'products/components/product_card.html' %}
    {% endfor %}
{% else %}
    <div class="col-span-full bg-white dark:bg-[#1E1E1E] rounded-3xl p-16 text-center shadow-lg">
        <h2 class="text-3xl font-bold mb-4">No hay productos disponibles</h2>
        <p class="text-gray-500 dark:text-gray-400">Vuelve a intentarlo más tarde o crea nuevos productos si eres administrador.</p>
    </div>
{% endif %}
