<div class="bg-white dark:bg-[#1E1E1E] rounded-2xl md:rounded-3xl overflow-hidden shadow-lg hover:shadow-2xl transition duration-500 hover:-translate-y-2 h-full flex flex-col">

    <!-- IMAGE -->
    <div class="h-40 md:h-56 overflow-hidden flex-shrink-0">
        <img src="/media/{{ product.image }}" class="w-full h-full object-cover transition duration-700" alt="{{ product.name }}">
    </div>

    <!-- CONTENT -->
    <div class="p-3 md:p-6 flex flex-col flex-grow">

        <!-- Title + Price -->
        <div class="flex items-start md:items-center justify-between gap-4">
            <h2 class="text-xl md:text-2xl font-bold leading-tight">{{ product.name }}</h2>
            <span class="bg-[#6F4E37] text-white px-3 md:px-4 py-1 rounded-full text-sm md:text-base whitespace-nowrap">${{ product.price }}</span>
        </div>

        <!-- Description -->
        <p class="mt-3 text-gray-600 dark:text-gray-400 text-sm md:text-base flex-grow">{{ product.description|truncatechars:120 }}</p>

        <!-- Footer: Stock + Actions -->
        <div class="mt-4 md:mt-6 pt-4 border-t border-gray-100 dark:border-gray-700 flex flex-col md:flex-row items-center md:justify-between gap-3">

            <span class="text-xs md:text-sm text-gray-500">Stock: {{ product.stock }}</span>

            <div class="flex w-full md:w-auto gap-2">
                <a href="{% url 'add_to_cart' product.id %}" class="flex-1 md:flex-none bg-[#6F4E37] text-white px-3 py-2 rounded-xl hover:scale-105 transition text-center text-sm md:text-base">Agregar</a>

                {% if request.session.user_role == 'admin' %}
                    <a href="{% url 'delete_product' product.id %}" class="flex-1 md:flex-none bg-red-500 text-white px-3 py-2 rounded-xl hover:scale-105 transition text-center text-sm md:text-base">Eliminar</a>
                {% endif %}
            </div>

        </div>

    </div>

</div>
