{% extends 'base.html' %}

{% block content %}

<section class="py-16 md:py-32 px-6">

    <div class="max-w-7xl mx-auto">

        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">

            <div>

                <h1 class="text-4xl md:text-5xl font-bold">
                    Productos
                </h1>

                <p class="text-gray-500 mt-3 text-sm md:text-base">
                    Administración profesional de productos
                </p>

            </div>

            {% if request.session.user_role == 'admin' %}
            <a href="{% url 'create_product' %}"
                class="w-full md:w-auto bg-[#6F4E37] text-white px-4 md:px-6 py-3 md:py-4 rounded-2xl hover:scale-105 transition text-center">

                Nuevo Producto

            </a>
            {% endif %}

        </div>

        <!-- SEARCH -->
        <input type="text" name="search" hx-get="{% url 'products' %}" hx-trigger="keyup changed delay:500ms"
            hx-target="#products" placeholder="Buscar café..." class="w-full p-5 rounded-2xl border">

        <!-- GRID -->
        <div id="products" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

            {% for product in products %}

            {% include 'products/components/product_card.html' %}

            {% endfor %}

        </div>

    </div>

</section>

{% endblock %}
