{% extends 'dashboard/base_dashboard.html' %}

{% block dashboard_content %}

<h1 class="text-4xl font-bold mb-10">

    Productos

</h1>

<div class="
grid
md:grid-cols-3
gap-8
">

    {% for product in products %}

    <div class="bg-white  dark:bg-[#1E1E1E]rounded-3xl p-6  shadow">

        <h2 class="text-2xl font-bold">

            {{product.name}}

        </h2>

        <p>

            Stock:

            {{product.stock}}

        </p>

        <p class="mt-3">

            ${{product.price}}

        </p>
    </div>

    {% endfor %}

</div>

{% endblock %}
